<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق المباريات الخارق - كاسر الحماية</title>
    <style>
        /* تصفير كامل وملء الشاشة بالألوان الفخمة */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #0b0f17; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* البار العلوي الفخم والمدمج تماماً لإخفاء الشعار */
        .premium-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 75px;
            background: linear-gradient(135deg, #0b0f17 0%, #111622 100%);
            border-bottom: 2px solid #1a2233;
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }

        /* زر العودة للرئيسية المصغر */
        .floating-back-btn {
            background: linear-gradient(135deg, rgba(230, 30, 80, 0.45), rgba(219, 39, 119, 0.4));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(230, 30, 80, 0.25);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .floating-back-btn:hover {
            background: linear-gradient(135deg, rgba(230, 30, 80, 0.65), rgba(219, 39, 119, 0.6));
            transform: translateY(-1px);
        }
        .floating-back-btn svg {
            width: 12px;
            height: 12px;
        }

        /* حاوية النصوص الترحيبية */
        .server-text-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
        }

        /* الجملة النصية المعدلة */
        .static-server-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 12px;
            font-weight: 600;
            user-select: none;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* جملة الترحيب المضافة */
        .welcome-text {
            color: #38bdf8;
            font-size: 11px;
            font-weight: 500;
            padding-right: 5px;
            user-select: none;
            pointer-events: none;
        }

        /* الحاوية الرئيسية للتمرير الذكي اللامتناهي */
        .window-clipper {
            position: absolute;
            top: 75px; 
            left: 0;
            width: 100%;
            height: calc(100% - 75px);
            overflow-y: scroll; /* السماح بالتمرير الحر لمنع قص المباريات الكثيرة */
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
        }
        .window-clipper::-webkit-scrollbar {
            display: none;
        }

        /* غلاف مرن بالكامل يتبع طول محتوى الموقع الأصلي بشكل طبيعي */
        .iframe-container-wrapper {
            position: relative;
            width: 100%;
            margin-top: -155px; 
            flex-shrink: 0;
        }

        /* الأي فريم يتنفس الآن ويتمدد تلقائياً مع الكروت الجديدة عبر الجافاسكريبت */
        iframe {
            width: 100%;
            height: 1560px; /* الارتفاع الافتراضي الذكي */
            border: none;
            background-color: #0b0f17;
            display: block;
        }

        /* 🛡️ مصد الحجب التلقائي الذكي الملتصق بقاع الجدول 🛡️ */
        .absolute-dark-mask {
            width: 100%;
            height: 250px; 
            background: linear-gradient(to top, #0b0f17 70%, rgba(11, 15, 23, 0.98) 100%);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            position: relative;
            z-index: 9999;
            pointer-events: all;
            flex-shrink: 0;
            margin-top: -30px; /* دمج فني مطاطي مع قاع الأي فريم */
        }
    </style>
</head>
<body>

    <div class="premium-header">
        <button class="floating-back-btn" onclick="refreshApp()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            العودة للرئيسية
        </button>

        <div class="server-text-container">
            <span class="static-server-text">جدول مباريات الخاص بTOD-Y 😉😉</span>
            <span class="welcome-text">مرحبا عمو المجتبى 👋👋</span>
        </div>
    </div>

    <div class="window-clipper" id="scrollContainer">
        <div class="iframe-container-wrapper">
            <iframe 
                id="siteFrame"
                src="https://koray.live/"
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-modals"
                scrolling="no">
            </iframe>
        </div>
        
        <!-- طبقة الحجب التي تتبع نهاية الجدول تلقائياً كالظل دون أن تلمس الكروت -->
        <div class="absolute-dark-mask"></div>
    </div>

    <script>
        const scrollContainer = document.getElementById('scrollContainer');
        const iframe = document.getElementById('siteFrame');

        function refreshApp() {
            iframe.src = "https://koray.live/";
            scrollContainer.scrollTop = 0;
        }

        try {
            iframe.contentWindow.open = function(url, windowName, windowFeatures) {
                window.open(url, '_blank');
                return null;
            };
        } catch (e) {}

        /* 🧠 محرك رصد الأبعاد اللامتناهي 🧠 */
        function dynamicClipEngine() {
            setTimeout(() => {
                try {
                    // إذا سمح الموقع بالقراءة الداخلية، نأخذ الطول الحقيقي بدقة ونخصم منه منطقة الإعلانات السفلية
                    let realHeight = iframe.contentWindow.document.body.scrollHeight;
                    if (realHeight && realHeight > 1000) {
                        iframe.style.height = (realHeight - 140) + "px"; 
                    }
                } catch(e) {
                    /* 🛡️ في حال تم تفعيل الحماية الجدارية، يظل الطول الحالي (1560px) هو الوزن الذهبي الآمن للأيام العادية */
                }
            }, 600);
        }

        window.addEventListener('load', dynamicClipEngine);
        iframe.onload = dynamicClipEngine;
    </script>

</body>
</html>
