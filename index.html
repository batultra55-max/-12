<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stream Premium App</title>
    <style>
        /* التصفير والتأسيس الداكن الصارم للشاشات والهواتف */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #120924; /* خلفية بنفسجية داكنة جداً وفخمة */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* قفل السكرول الخارجي لثبات التطبيق */
            color: #ffffff;
            position: relative;
        }

        /* حاوية الأقسام الرئيسية الثابتة بمقاس الشاشة تماماً */
        .app-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - 55px); /* مساحة محجوزة بدقة للشريط السفلي */
            overflow: hidden;
        }

        /* شاشات الأقسام الثابتة المتوافقة مع متصفحات التلفزيون والهواتف */
        .tab-content {
            display: none;
            width: 100%;
            height: 100%;
            overflow-y: auto; /* تفعيل السكرول هنا ليعمل مع الأزرار العائمة */
            -webkit-overflow-scrolling: touch;
            position: relative;
        }

        .tab-content.active {
            display: block;
        }

        /* ضبط الـ iframe ليتمدد بالكامل داخل الحاوية القابلة للتمرير */
        iframe {
            width: 100%;
            height: 4000px; /* ارتفاع افتراضي كبير ومناسب للمجلدات والمباريات الطويلة لتفعيل السكرول على التلفزيون */
            border: none;
            background-color: #120924;
            display: block;
            padding-bottom: 80px; /* مساحة أمان سفلية لضمان ظهور آخر المجلدات */
        }

        /* شريط التنقل السفلي الثابت بقوة - مزيج بنفسجي وذهبي مشع */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55px;
            background: linear-gradient(to top, #090314 90%, rgba(18, 9, 36, 0.98));
            border-top: 1px solid rgba(255, 215, 0, 0.2); /* حافة ذهبية خفيفة */
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 99999;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.8);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            height: 100%;
            color: #a395be; /* بنفسجي فاتح قبل التحديد */
            text-decoration: none;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            gap: 2px;
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: all 0.25s ease;
        }

        /* حالة التفعيل: ذهبي مشع يتوهج بقوة خلف الخلفية البنفسجية */
        .nav-item.active {
            color: #ffd700; /* ذهبي خالص */
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.6), 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .nav-item.active svg {
            stroke: #ffd700;
            filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.8));
            transform: scale(1.05);
        }

        /* الأزرار العائمة للتمرير الدقيق - ذهبية مشعة مذهلة */
        .scroll-controls {
            position: fixed;
            bottom: 75px; 
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 99999;
        }

        .scroll-btn {
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, #ffd700, #b8860b); /* تدرج ذهبي مشع */
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #120924; /* لون أيقونة داكن لتظهر بوضوح وسط الذهب */
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4), 0 0 10px rgba(255, 215, 0, 0.2);
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }

        .scroll-btn:active {
            transform: scale(0.85);
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.6);
        }

        .scroll-btn svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: currentColor;
            stroke-width: 3;
        }

        /* القائمة المنبثقة المخصصة الفخمة */
        .custom-menu {
            position: fixed;
            display: none;
            background-color: #1a0c33;
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 2000000;
            padding: 6px 0;
            min-width: 160px;
            backdrop-filter: blur(10px);
        }

        .custom-menu-item {
            padding: 10px 16px;
            font-size: 13px;
            color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .custom-menu-item:hover {
            background-color: #ffd700;
            color: #120924;
        }

        /* نافذة العرض المنبثقة العائمة */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 2, 10, 0.85);
            z-index: 3000000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        .popup-box {
            width: 90%;
            height: 80%;
            max-width: 800px;
            background-color: #120924;
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            position: relative;
            animation: popupShow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes popupShow {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .popup-header {
            height: 45px;
            background-color: #1a0c33;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }

        .popup-title {
            font-size: 13px;
            font-weight: 600;
            color: #ffd700;
        }

        .popup-close {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .popup-close:hover {
            color: #ffd700;
        }

        .popup-body {
            flex: 1;
            width: 100%;
            height: 100%;
        }

        .popup-body iframe {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="matches-tab" class="tab-content active" oncontextmenu="handleRightClick(event)">
            <iframe id="iframe-matches" src="https://batultra55-max.github.io/matches-/"></iframe>
        </div>

        <div id="videos-tab" class="tab-content">
            <iframe id="iframe-videos" src="https://tnors57-max.github.io/molksat/"></iframe>
        </div>

        <div id="cup-tab" class="tab-content">
            <iframe id="iframe-cup" src="https://tnors57-max.github.io/Majmoaat-cup/"></iframe>
        </div>

    </div>

    <div class="scroll-controls">
        <div class="scroll-btn" onclick="executePreciseScroll(-200)">
            <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"></polyline></svg>
        </div>
        <div class="scroll-btn" onclick="executePreciseScroll(200)">
            <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
    </div>

    <div class="custom-menu" id="context-menu">
        <div class="custom-menu-item" onclick="openMatchInPopup()">
            <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2.5;"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
            فتح في نافذة منبثقة
        </div>
    </div>

    <div class="popup-overlay" id="match-popup">
        <div class="popup-box">
            <div class="popup-header">
                <span class="popup-title">شاشة العرض المنبثقة الذكية</span>
                <button class="popup-close" onclick="closePopup()">✕</button>
            </div>
            <div class="popup-body">
                <iframe id="popup-iframe" src=""></iframe>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('matches-tab', this)">
            <svg viewBox="0 0 24 24">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <span>جدول المباريات</span>
        </div>

        <div class="nav-item" onclick="switchTab('videos-tab', this)">
            <svg viewBox="0 0 24 24">
                <polygon points="23 7 16 12 23 17 23 7"></polygon>
                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
            </svg>
            <span>ملخصات</span>
        </div>

        <div class="nav-item" onclick="switchTab('cup-tab', this)">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path>
                <line x1="2" y1="12" x2="22" y2="12"></line>
            </svg>
            <span>توقع مجموعات كأس العالم</span>
        </div>
    </div>

    <script>
        function switchTab(tabId, element) {
            const tabs = document.querySelectorAll('.tab-content');
            tabs.forEach(tab => tab.classList.remove('active'));

            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => item.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
            closePopup();
        }

        // دالة التمرير الدقيق المحدثة والمثالية للتحكم الخارجي
        function executePreciseScroll(amount) {
            const activeTab = document.querySelector('.tab-content.active');
            if (activeTab) {
                // نقوم الآن بتمرير الحاوية النشطة مباشرة (الحل الجذري لتخطي حماية متصفح التلفزيون للـ iframe)
                activeTab.scrollBy({ top: amount, behavior: 'smooth' });
            }
        }

        // نظام إدارة القائمة المنبثقة للضغط المطول وكليك يمين
        const contextMenu = document.getElementById('context-menu');
        const matchPopup = document.getElementById('match-popup');
        const popupIframe = document.getElementById('popup-iframe');
        let touchTimeout;

        function handleRightClick(e) {
            e.preventDefault();
            showMenu(e.clientX, e.clientY);
        }

        const matchesTab = document.getElementById('matches-tab');
        matchesTab.addEventListener('touchstart', function(e) {
            touchTimeout = setTimeout(function() {
                const touch = e.touches[0];
                showMenu(touch.clientX, touch.clientY);
            }, 600);
        }, { passive: true });

        matchesTab.addEventListener('touchend', function() { clearTimeout(touchTimeout); });
        matchesTab.addEventListener('touchmove', function() { clearTimeout(touchTimeout); });

        function showMenu(x, y) {
            contextMenu.style.left = `${x}px`;
            contextMenu.style.top = `${y}px`;
            contextMenu.style.display = 'block';
        }

        document.addEventListener('click', function() { contextMenu.style.display = 'none'; });

        function openMatchInPopup() {
            const activeTab = document.querySelector('.tab-content.active');
            if (activeTab) {
                const currentIframe = activeTab.querySelector('iframe');
                if (currentIframe) {
                    popupIframe.src = currentIframe.src; 
                }
            }
            matchPopup.style.display = 'flex';
        }

        function closePopup() {
            matchPopup.style.display = 'none';
            popupIframe.src = "";
        }
    </script>

</body>
</html>
