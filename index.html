<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stream Premium App</title>
    <style>
        /* التصفير والتأسيس الداكن الصارم لمنع التمرير الخارجي */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #0b0f17;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* قفل السكرول الخارجي لثبات التطبيق */
            color: #ffffff;
            position: relative;
        }

        /* حاوية الأقسام الرئيسية الثابتة */
        .app-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - 55px); /* مساحة ثابتة ومحجوزة للشريط السفلي */
            overflow: hidden;
        }

        /* شاشات الأقسام الثابتة */
        .tab-content {
            display: none;
            width: 100%;
            height: 100%;
            overflow-y: auto; /* السماح بالتمرير الداخلي فقط */
            -webkit-overflow-scrolling: touch;
        }

        .tab-content.active {
            display: block;
        }

        /* امتداد الـ iframe لعرض كامل المحتوى الخارجي */
        iframe {
            width: 100%;
            height: 500vh; /* طول افتراضي كافٍ لجميع القنوات والمباريات */
            border: none;
            background-color: #0b0f17;
            display: block;
        }

        /* شريط التنقل السفلي الثابت بقوة */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55px;
            background: linear-gradient(to top, #06090e 90%, rgba(11, 15, 23, 0.98));
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 999999;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.7);
        }

        /* أزرار الأقسام المصغرة */
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            height: 100%;
            color: #7e8ba2;
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            gap: 2px;
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .nav-item.active {
            color: #e50914; /* الهوية الحمراء الفخمة */
            text-shadow: 0 0 8px rgba(229, 9, 20, 0.3);
        }

        .nav-item.active svg {
            stroke: #e50914;
        }

        /* الأزرار العائمة المصممة للتحكم الدقيق */
        .scroll-controls {
            position: fixed;
            bottom: 75px; 
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 999999;
        }

        .scroll-btn {
            width: 46px;
            height: 46px;
            background-color: rgba(229, 9, 20, 0.95); 
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            transition: all 0.2s ease;
        }

        .scroll-btn:hover {
            background-color: #ff121c;
        }

        .scroll-btn:active {
            transform: scale(0.85);
            background-color: #b90710;
        }

        .scroll-btn svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: currentColor;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="matches-tab" class="tab-content active">
            <iframe src="https://batultra55-max.github.io/matches-/"></iframe>
        </div>

        <div id="backup-tab" class="tab-content">
            <iframe src="https://batultra55-max.github.io/Tod-y/"></iframe>
        </div>

    </div>

    <div class="scroll-controls">
        <div class="scroll-btn" onclick="executePreciseScroll(-120)" title="تمرير دقيق لأعلى">
            <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"></polyline></svg>
        </div>
        <div class="scroll-btn" onclick="executePreciseScroll(120)" title="تمرير دقيق لأسفل">
            <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('matches-tab', this)">
            <svg viewBox="0 0 24 24">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <span>جدول المباريات</span>
        </div>

        <div class="nav-item" onclick="switchTab('backup-tab', this)">
            <svg viewBox="0 0 24 24">
                <path d="M5 17H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-1"></path>
                <polygon points="12 7 17 12 12 17 12 7"></polygon>
                <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
            <span>البث الأحتياطي</span>
        </div>
    </div>

    <script>
        // دالة التنقل بين الأقسام
        function switchTab(tabId, element) {
            const tabs = document.querySelectorAll('.tab-content');
            tabs.forEach(tab => tab.classList.remove('active'));

            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => item.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
        }

        // دالة التمرير الهادئ، الدقيق والسلس جداً بنقرة واحدة
        function executePreciseScroll(amount) {
            const activeTab = document.querySelector('.tab-content.active');
            
            if (activeTab) {
                // استخدام الخوارزمية الرياضية المدمجة في المتصفح للتمرير الانسيابي الموزون
                activeTab.scrollBy({
                    top: amount,
                    behavior: 'smooth' 
                });
            }
        }
    </script>

</body>
</html>
